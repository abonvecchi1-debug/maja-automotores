name: Build Desktop App (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Install Electron (for build only)
        run: npm install --save-dev electron@latest electron-builder@latest @electron/rebuild@latest
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '0'

      - name: Build React frontend
        run: npm run build

      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build Electron installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: maja-automotores-windows
          path: release/*.exe
          retention-days: 30
