appId: com.majaautomotores.app
productName: Maja Automotores
copyright: Maja Automotores

directories:
  output: release

files:
  - server/**
  - electron/**
  - node_modules/**
  - package.json
  - "!src/**"
  - "!.env*"
  - "!release/**"
  - "!.github/**"

extraResources:
  - from: dist
    to: dist

asarUnpack:
  - "**/node_modules/better-sqlite3/**"

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Maja Automotores

publish:
  provider: github
  owner: abonvecchi1-debug
  repo: maja-automotores
  releaseType: release
